id = "delivery-gate"
title = "Styio Unified Delivery Gate"
purpose = "Define the common delivery-floor entrypoint for hygiene, docs, and checkpoint health."
last_updated = "2026-04-16"
doc = "DELIVERY-GATE.md"

commands = [
  "./scripts/delivery-gate.sh --mode checkpoint",
  "./scripts/delivery-gate.sh --mode push --base origin/main",
  "./scripts/delivery-gate.sh --mode checkpoint --skip-health",
]

delegates = [
  "repo hygiene",
  "docs gate",
  "checkpoint health",
]
