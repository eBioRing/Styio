name: styio-ci-gate

on:
  pull_request:
  push:
    branches:
      - ai-dev
      - nightly
      - stable
      - main
      - master
      - agent-dev

jobs:
  styio-ci-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          path: styio-nightly

      - name: Resolve ecosystem lane
        id: lane
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TARGET_LANE="${{ github.base_ref }}"
          else
            TARGET_LANE="${{ github.ref_name }}"
          fi

          case "$TARGET_LANE" in
            ai-dev|nightly|stable|main)
              ECOSYSTEM_REF="nightly"
              ;;
            *)
              ECOSYSTEM_REF="nightly"
              ;;
          esac

          echo "target_lane=$TARGET_LANE" >> "$GITHUB_OUTPUT"
          echo "ecosystem_ref=$ECOSYSTEM_REF" >> "$GITHUB_OUTPUT"

      - name: Check out styio-spio sibling repository
        uses: actions/checkout@v5
        with:
          repository: Unka-Malloc/styio-spio
          ref: ${{ steps.lane.outputs.ecosystem_ref }}
          path: styio-spio

      - name: Check out styio-view sibling repository
        uses: actions/checkout@v5
        with:
          repository: Unka-Malloc/styio-view
          ref: ${{ steps.lane.outputs.ecosystem_ref }}
          path: styio-view

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check tracked tree
        working-directory: styio-nightly
        run: python3 scripts/repo-hygiene-gate.py --mode tracked

      - name: Check ecosystem CLI doc consistency
        working-directory: styio-nightly
        run: python3 scripts/ecosystem-cli-doc-gate.py --require-workspace --json

      - name: Check incoming history range
        shell: bash
        working-directory: styio-nightly
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            RANGE="HEAD"
          else
            RANGE="${{ github.event.before }}..${{ github.sha }}"
          fi
          python3 scripts/repo-hygiene-gate.py --mode push --range "$RANGE"

      - name: Check runtime export and ORC registration surface
        working-directory: styio-nightly
        run: python3 scripts/runtime-surface-gate.py

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-18 \
            lld-18 \
            llvm-18-dev \
            libicu-dev \
            python3

      - name: Configure
        working-directory: styio-nightly
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=clang-18
          -DCMAKE_CXX_COMPILER=clang++-18
          -DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm
          -DSTYIO_ENABLE_FUZZ=ON

      - name: Build
        working-directory: styio-nightly
        run: >
          cmake --build build --target
          styio styio_test styio_security_test styio_soak_test
          styio_fuzz_lexer styio_fuzz_parser

      - name: Docs audit
        working-directory: styio-nightly
        run: ctest --test-dir build -L docs --output-on-failure

      - name: Security tests
        working-directory: styio-nightly
        run: ctest --test-dir build -L security --output-on-failure

      - name: Five-layer pipeline tests
        working-directory: styio-nightly
        run: ctest --test-dir build -L styio_pipeline --output-on-failure

      - name: Parser shadow gate (M1 full suite + artifacts)
        working-directory: styio-nightly
        run: |
          mkdir -p build/parser-shadow-artifacts
          ./benchmark/parser-shadow-suite-gate.sh ./build/bin/styio ./tests/milestones/m1 ./build/parser-shadow-artifacts

      - name: Parser shadow gate (M2 full suite + artifacts)
        working-directory: styio-nightly
        run: |
          mkdir -p build/parser-shadow-artifacts-m2
          ./benchmark/parser-shadow-suite-gate.sh ./build/bin/styio ./tests/milestones/m2 ./build/parser-shadow-artifacts-m2

      - name: Upload parser shadow artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: parser-shadow-artifacts
          path: |
            styio-nightly/build/parser-shadow-artifacts
            styio-nightly/build/parser-shadow-artifacts-m2
          if-no-files-found: ignore

      - name: Soak smoke tests
        working-directory: styio-nightly
        run: ctest --test-dir build -L soak_smoke --output-on-failure

      - name: Milestone smoke
        working-directory: styio-nightly
        run: ctest --test-dir build -R '^m1_t01_int_arith$|^m2_t01_simple_func$' --output-on-failure

      - name: Fuzz smoke
        working-directory: styio-nightly
        run: ctest --test-dir build -L fuzz_smoke --output-on-failure
